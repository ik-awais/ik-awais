name: Generate Snake Animation

on:
schedule:
# Run daily at midnight UTC
- cron: "0 0 * * *"

# Allow manual workflow execution

workflow_dispatch:

permissions:
contents: write

jobs:
generate:
name: Generate & Deploy Snake
runs-on: ubuntu-latest
timeout-minutes: 10

```
steps:
  - name: 🐍 Generate Snake SVG (Cyberpunk Edition)
    uses: Platane/snk@v3
    with:
      github_user_name: ik-awais
      # URL-encoded hex colors (%23 = #)
      # color_snake = Purple (#9B59FF)
      # color_dots = Background to Cyan (#060610 -> #00d4ff)
      outputs: |
        dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%239B59FF&color_dots=%23060610,%23005573,%230080aa,%2300aae6,%2300d4ff
        dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%239B59FF&color_dots=%23ebedf0,%23b3f0ff,%2366e0ff,%231ad1ff,%2300d4ff
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  - name: 🚀 Deploy to output branch
    uses: crazy-max/ghaction-github-pages@v4
    with:
      target_branch: output
      build_dir: dist
      commit_message: "chore: update cyberpunk contribution snake animation"
      keep_history: false
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

```
