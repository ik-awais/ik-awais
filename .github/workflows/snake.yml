name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 🐍 Generate Snake SVG (Cyber Edition)
        uses: Platane/snk@v3
        with:
          github_user_name: ik-awais
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00d4ff&color_dots=7c3aed,9B59FF,bf7af0,00d4ff,06bb7a
            dist/github-contribution-grid-snake.svg?color_snake=00d4ff&color_dots=7c3aed,9B59FF,bf7af0,00d4ff,06bb7a
          
      - name: 🚀 Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
